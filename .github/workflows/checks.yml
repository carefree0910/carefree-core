name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.14"]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install constrained tools
        if: matrix.python-version == '3.8'
        run: |
          python -m pip install --upgrade "pip==24.2"
          python -m pip install -c requirements/constraints-ci.txt black mypy types-requests
      - name: Install Python 3.14 tools
        if: matrix.python-version == '3.14'
        run: |
          python -m pip install --upgrade pip
          python -m pip install black mypy types-requests
      - name: black
        run: python -m black . --check --diff
      - name: mypy
        run: python -m mypy core
